unit: defs/prototypes
name: "_{Prototype Class}"
group: "_{Player Core}"

inc:
  - copy: prototype-class
    params:
      class:
      class-name:
      subclass:
      subclass-name:
      hp:
      key-attribute:

      perception: trained
      unarmoured:
      light-armour:
      medium-armour:
      heavy-armour:

      fortitude:
      reflex:
      will:

      spells:

      acrobatics:
      arcana:
      athletics:
      crafting:
      deception:
      diplomacy:
      intimidation:
      medicine:
      nature:
      occultism:
      performance:
      religion:
      society:
      stealth:
      survival:
      thievery:

    contents:
      - set: class-code
        value: "#{class}"
      - set: class
        value: "#{class-name}"

      - set: hp-class
        value: "#{hp}"
      - set: class-icon
        value: "#{class}"
      - set: subclass-label
        value: "#{subclass-name}"

      - if: "#{key-attribute}"
        then:
          - set: key-attribute
            value: "#{key-attribute}"
            
      - at: '@key-attribute-field'
        replace:
          - if: "#{key-attribute}"
            then:
              - field:
                label: "#{key-attribute}"
                underlay: "#{key-attribute}"
                ref: "#{key-attribute}"
            else:
              - field: "#{id}-attribute"
                label: "_{Key attribute}"
                ref: "=key-attribute"
                misc: true

      # Class DC
      - set: "#{class}-class-dc-proficiency"
        value: trained
      - set: perception-proficiency
        value: "#{perception}"

      # Spells
      - set: spell-attack-proficiency
        value: "#{spells}"
      - set: spell-dc-proficiency
        value: "#{spells}"

      - at: '@spell-proficiency-field'
        replace:
          - if: "#{spells}"
            then:
              - field: "spell-attack-proficiency"
                control: proficiency
                has-bonus: false
                frame: right
                label: "_{Spells}"

      # Armour
      - set: unarmoured-proficiency
        value: "#{unarmoured}"
      - set: light-armour-proficiency
        value: "#{light-armour}"
      - set: medium-armour-proficiency
        value: "#{medium-armour}"
      - set: heavy-armour-proficiency
        value: "#{heavy-armour}"

      # Weapons
      - set: unarmed-proficiency
        value: "#{unarmed}"
      - set: simple-weapon-proficiency
        value: "#{simple-weapons}"
      - set: martial-weapon-proficiency
        value: "#{martial-weapons}"

      # Saving throws
      - set: fortitude-proficiency
        value: "#{fortitude}"
      - set: reflex-proficiency
        value: "#{reflex}"
      - set: will-proficiency
        value: "#{will}"

      # Skills
      - set: "acrobatics-proficiency"
        value: "#{acrobatics}"
      - set: "arcana-proficiency"
        value: "#{arcana}"
      - set: "athletics-proficiency"
        value: "#{athletics}"
      - set: "crafting-proficiency"
        value: "#{crafting}"
      - set: "deception-proficiency"
        value: "#{deception}"
      - set: "diplomacy-proficiency"
        value: "#{diplomacy}"
      - set: "intimidation-proficiency"
        value: "#{intimidation}"
      - set: "medicine-proficiency"
        value: "#{medicine}"
      - set: "nature-proficiency"
        value: "#{nature}"
      - set: "occultism-proficiency"
        value: "#{occultism}"
      - set: "performance-proficiency"
        value: "#{performance}"
      - set: "religion-proficiency"
        value: "#{religion}"
      - set: "society-proficiency"
        value: "#{society}"
      - set: "stealth-proficiency"
        value: "#{stealth}"
      - set: "survival-proficiency"
        value: "#{survival}"
      - set: "thievery-proficiency"
        value: "#{thievery}"

      - at: '@cover-class'
        replace:
          - h6: "#{class-name}"
          - if: "#{subclass}"
            then:
              - field: "#{subclass}"
                label: "#{subclass-name}"
                width: stretch
                align: left

  - copy: prototype-key-attribute
    params:
      key-attribute: 
    contents:
      - at: '@key-attribute-field'
        replace:
          - field:
            label: "#{key-attribute}"
            underlay: "#{key-attribute}"
            ref: "#{key-attribute}"
