unit: defs/dcs
group: "_{Player Core}"

inc:
  - copy: class-dc
    params:
      id: class-dc
      legend: "_{Class DC}"
      attribute: ''
      misc: true
    contents:
      - calc:
        output:
          field: "#{id}"
          legend: "#{legend}"
          underlay: "_{DC}"
          width: large
          icon: dc
          eq: "10+%{#{id}-attribute}+%{#{id}-proficiency-bonus}+%{#{id}-misc}"
        inputs:
          - span: 10 +
          - if: "#{attribute}=="
            then:
              - field: "#{id}-attribute"
                label: "_{Key attribute}"
                ref: "=key-attribute"
                misc: true
            else:
              - field: "#{id}-attribute"
                label: "_{#{attribute}}"
                underlay: "_{#{attribute}}"
                ref: "#{attribute}"
                misc: true
          - span: "+"
            optional: true
          - field: "#{id}-proficiency"
            label: "_{Proficiency}"
            control: proficiency
          - if: "#{misc}"
            then:
              - span: "+"
                optional: true
              - field: "#{id}-misc"
                label: "_{Misc}"
                misc: true
                optional: true

  - copy: spell-attack
    params:
      id: spell-attack
      legend: "_{Spell\nAttack}"
      attribute: ""
      misc: true
    contents:
      - calc:
        output:
          field: "#{id}"
          legend: "#{legend}"
          width: large
          overprint: true
          icon: bonus
          format: modifier
          eq: '%{#{id}-attribute}+%{#{id}-proficiency-bonus}+%{#{id}-misc}'
        inputs:
          - if: "#{attribute}=="
            then:
              - field: "#{id}-attribute"
                label: "_{Key attribute}"
                ref: "=key-attribute"
                misc: true
            else:
              - field: "#{id}-attribute"
                label: "_{#{attribute}}"
                underlay: "_{#{attribute}}"
                ref: "#{attribute}"
                misc: true
          - span: "+"
          - field: "#{id}-proficiency"
            label: "_{Proficiency}"
            control: proficiency
          - if: "#{misc}"
            then:
              - span: "+"
                optional: true
              - field: "#{id}-misc"
                label: "_{Misc}"
                misc: true
                optional: true

  - copy: inate-spell-attack
    params:
      id: inate-spell-attack
      legend: "_{Spell\nAttack}"
      ability: ""
      misc: true
    contents:
      - calc:
        output:
          field: "#{id}"
          legend: "#{legend}"
          width: large
          overprint: true
          icon: bonus
          format: modifier
          eq: '%{#{id}-ability}+%{#{id}-proficiency-bonus}+%{#{id}-misc}'
        inputs:
          - field: "#{id}-ability"
            label: "_{#{ability}}"
            underlay: "_{#{ability}}"
            ref: "#{ability}"
            misc: true
          - span: "+"
          - field: "#{id}-proficiency"
            label: "_{Proficiency}"
            control: proficiency
          - if: "#{misc}"
            then:
              - span: "+"
                optional: true
              - field: "#{id}-misc"
                label: "_{Misc}"
                misc: true
                optional: true

  - copy: spell-dc
    params:
      id: spell-dc
      legend: "_{Spell Save DC}"
      attribute: ""
      misc: true
    contents:
      - calc:
        output:
          field: "#{id}"
          legend: "#{legend}"
          underlay: "_{DC}"
          width: large
          overprint: true
          icon: dc
          eq: '10+%{#{id}-attribute}+%{#{id}-proficiency-bonus}+%{#{id}-misc}'
        inputs:
          - span: 10 +
          - if: "#{attribute}=="
            then:
              - field: "#{id}-attribute"
                label: "_{Key attribute}"
                ref: "=key-attribute"
                misc: true
            else:
              - field: "#{id}-attribute"
                label: "_{#{attribute}}"
                underlay: "_{#{attribute}}"
                ref: "#{attribute}"
                misc: true
          - span: "+"
          - field: "#{id}-proficiency"
            label: "_{Proficiency}"
            control: proficiency
          - if: "#{misc}"
            then:
              - span: "+"
                optional: true
              - field: "#{id}-misc"
                label: "_{Misc}"
                misc: true
                optional: true

  - copy: arcane-spell-dcs
    params:
      attribute: ''
    contents:
      - paste: spell-attack
        params:
          id: arcane-spell-attack
          legend: "_{Arcane Spell\nAttack}"
          attribute: "#{attribute}"
      - paste: spell-dc
        params:
          id: arcane-spell-save-dc
          legend: "_{Arcane Spell\nSave DC}"
          attribute: "#{attribute}"
          
  - copy: divine-spell-dcs
    params:
      attribute: ''
    contents:
      - paste: spell-attack
        params:
          id: divine-spell-attack
          legend: "_{Divine Spell\nAttack}"
          attribute: "#{attribute}"
      - paste: spell-dc
        params:
          id: divine-spell-save-dc
          legend: "_{Divine Spell\nSave DC}"
          attribute: "#{attribute}"
          
  - copy: occult-spell-dcs
    params:
      attribute: ''
    contents:
      - paste: spell-attack
        params:
          id: occult-spell-attack
          legend: "_{Occult Spell\nAttack}"
          attribute: "#{attribute}"
      - paste: spell-dc
        params:
          id: occult-spell-save-dc
          legend: "_{Occult Spell\nSave DC}"
          attribute: "#{attribute}"
          
  - copy: primal-spell-dcs
    params:
      attribute: ''
    contents:
      - paste: spell-attack
        params:
          id: primal-spell-attack
          legend: "_{Primal Spell\nAttack}"
          attribute: "#{attribute}"
      - paste: spell-dc
        params:
          id: primal-spell-save-dc
          legend: "_{Primal Spell\nSave DC}"
          attribute: "#{attribute}"
