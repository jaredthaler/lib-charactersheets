unit: heritage/versatile/remaster/nephilim
in: heritage/versatile
group: "_{Player Core}"
name: "_{Nephilim}"

require:
  - unit: optional-darkvision

inc:
  - set: heritage
    value: "_{Nephilim}"

  - at: '@heritage'
    replace:
      - article:
        title: "_{Nephilim}"
        contents:
          - flags:
              - "_{Nephilim}"
          - p: "_{May take nephilim feats.}"
          - paste: optional-darkvision
