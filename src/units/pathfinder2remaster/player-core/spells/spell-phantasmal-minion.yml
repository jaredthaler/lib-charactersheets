unit: spell/phantasmal-minion
name: "_{Phantasmal Minion}"
group: "_{Core Rulebook}"

inc:
  - copy: spell/phantasmal-minion
    contents:
      - article: spell/phantasmal-minion
        title: "_{Phantasmal Minion}"
        cat: "_{Spell} 1"
        contents:
          - dl:
              range: "_{60ft}"
              duration: "_{Sustained}"
          - action: 3
            contents:
              - p: "_{Summon an phantasmal minion.}"

          - hr:
            light: true

          - row:
            merge-bottom: true
            contents:
              - field: "##:STR"
                label: "_{STR}"
                value: "-4"
                width: tiny
              - field: "##:DEX"
                label: "_{DEX}"
                value: "+2"
                width: tiny
              - field: "##:CON"
                label: "_{CON}"
                value: "+0"
                width: tiny
              - field: "##:INT"
                label: "_{INT}"
                value: "-5"
                width: tiny
              - field: "##:WIS"
                label: "_{WIS}"
                value: "+0"
                width: tiny
              - field: "##:CHA"
                label: "_{CHA}"
                value: "+0"
                width: tiny
              - vr:
              - field: spell/unseen-servant/speed
                label: "_{Speed}"
                value: "_{Fly} _{30ft}"
          
          - row:
            merge-bottom: true
            contents:
              - field: spell/unseen-servant/hp
                label: "_{Hit Points}"
                border: full
                width: huge
                suffix: "/ 4 hp"
              - field: spell/unseen-servant/ac
                label: "_{Armour Class}"
                value: 13
              - spacer:
              - vr:
              - field: "##:fortitude"
                label: "_{FORT}"
                value: "+0"
                width: small
              - field: "##:reflex"
                label: "_{REF}"
                value: "+4"
                width: small
              - field: "##:will"
                label: "_{WILL}"
                value: "+0"
                width: small

          - p:
            title: "_{Immune}"
            content: "_{disease, mental, non-magical attacks, paralysis, poison, precision, spirit, unconscious}"
          - value-block: 5
            content: "_{Damage resistance (except force or ghost touch)}"

          - paste: book-ref
            params:
              page-ref: "_{PC p349}"

          - hr:
            light: true
          - action:
            contents:
              - p:
                title: "_{Sustain}"
                content: "_{Maintain the minion}"
