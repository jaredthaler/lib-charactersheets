unit: heritage/tengu/remaster/taloned
in: heritage/apg/tengu
group: "_{Player Core 2}"
name: "_{Taloned Tengu}"
# enabled: false

inc:
  # set the heritage name
  - set: heritage
    value: "_{Taloned Tengu}"

  # create the heritage text block
  - at: '@heritage'
    replace:
      - article:
        title: "_{Taloned Tengu}"
        contents:
          # simple description
          # add a weapon
          - paste: natural-weapon
            params:
              name: "_{Talon}"
              damage: "_{1d4}"
              type: "_{Slashing}"
          - flags:
              - "_{Agile}"
              - "_{Brawling}"
              - "_{Finesse}"
              - "_{Unarmed}"
              - "_{Versatile P}"


  # add a natural weapon
  - at: '@actions'
    add:
      - action: 1
        contents:
          - article:
            title: "_{Talon attack}"
            contents:
              - paste: natural-weapon-action
                params:
                  id: tengu/taloned/talon-attack-action
                  name: "_{Talon}"
                  damage: "_{1d4}"
                  type: "_{S}"
              - flags:
                  - "_{Agile}"
                  - "_{Brawling}"
                  - "_{Finesse}"
                  - "_{Unarmed}"
                  - "_{Versatile P}"
