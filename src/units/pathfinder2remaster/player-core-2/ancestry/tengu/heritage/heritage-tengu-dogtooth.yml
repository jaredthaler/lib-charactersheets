unit: heritage/tengu/remaster/dogtooth
in: heritage/apg/tengu
group: "_{Player Core 2}"
name: "_{Dogtooth Tengu}"
# enabled: false

inc:
  # set the heritage name
  - set: heritage
    value: "_{Dogtooth Tengu}"

  # create the heritage text block
  - at: '@heritage'
    replace:
      - article:
        title: "_{Dogtooth Tengu}"
        contents:
          # simple description
          - row:
            contents:
              - h6: "_{Beak}"
              - flags:
                  - "_{Deadly} _{d8}"

  - at: @ancestry-action-tengu-beak-traits
    replace: 
      contents:
        - flags:
            - "_{Brawling}"
            - "_{Deadly} _{d8}"
            - "_{Finesse}"
            - "_{Unarmed}"

          
