unit: heritage/tengu/remaster/stormtossed
in: heritage/apg/tengu
group: "_{Player Core 2}"
name: "_{Stormtossed Tengu}"
# enabled: false

inc:
  # set the heritage name
  - set: heritage
    value: "_{Stormtossed Tengu}"

  # create the heritage text block
  - at: '@heritage'
    replace:
      - article:
        title: "_{Stormtossed Tengu}"
        contents:
          # simple description
          - p: "_{Ignore concealment due to rain or fog.}"
          # damage resist
          - paste: leveled-damage-resist
            params 
              id: tengu/stormtossed/electricity-resistance
              type: "_{Electricity}"


  # add a damage resist
  - at: '@health'
    add:
      - paste: leveled-damage-resist-health
        params:
          id: tengu/stormtossed/electricity-resist-health
          type: "_{Electricity}"
