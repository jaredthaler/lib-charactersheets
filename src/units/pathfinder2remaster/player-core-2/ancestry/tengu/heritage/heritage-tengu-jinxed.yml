unit: heritage/tengu/remaster/jinxed
in: heritage/apg/tengu
group: "_{Player Core 2}"
name: "_{Jinxed Tengu}"
# enabled: false

inc:
  # set the heritage name
  - set: heritage
    value: "_{Jinxed Tengu}"

  # create the heritage text block
  - at: '@heritage'
    replace:
      - article:
        title: "_{Jinxed Tengu}"
        contents:
          # simple description
          - p: "_{Upgraded success when you succeed at a save against a curse or misfortune.}"
            icon: save-crit-succeed
          - value-block: "_{DC 17}"
            width: medium
            content: "_{flat check to reduce doomed condition you would gain by 1}"

    # add a heritage savign throw upgraded success
  - at: "@saving-throws"
    add:
      - p: "_{Upgraded success when you succeed at a save against a curse or misfortune.}"
        title: "_{Jinxed Tengu}"
        icon: save-crit-succeed

