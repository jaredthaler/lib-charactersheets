unit: heritage/ratfolk/remaster/shadow
in: heritage/apg/ratfolk
group: "_{Player Core 2}"
name: "_{Shadow Ratfolk}"
# enabled: false

inc:
  # set the heritage name
  - set: heritage
    value: "_{Shadow Ratfolk}"

  - set: intimidation-proficiency
    value: trained

  # create the heritage text block
  - at: '@heritage'
    replace:
      - article:
        title: "_{Shadow Ratfolk}"
        contents:
          # simple description
          - p: "_{Can use Intimidation to Coerce animals.}"
          - p: "_{Demoralise an animal without taking the language penalty.}"
          - p: "_{Animals' attitude begins one step worse.}"
