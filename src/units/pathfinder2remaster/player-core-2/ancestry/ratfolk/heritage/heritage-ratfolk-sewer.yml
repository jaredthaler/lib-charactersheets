unit: heritage/ratfolk/remaster/sewer
in: heritage/apg/ratfolk
group: "_{Player Core 2}"
name: "_{Sewer Ratfolk}"
# enabled: false

inc:
  # set the heritage name
  - set: heritage
    value: "_{Sewer Ratfolk}"

  # create the heritage text block
  - at: '@heritage'
    replace:
      - article:
        title: "_{Sewer Ratfolk}"
        contents:
          # simple description
          - p: "_{Immune to putrid plague.}"
          - value-block: "+1"
            content: "_{on saves vs diseases and poisons}"
          - p: "_{upgraded success on saves vs diseases and poisons}"
            icon: save-crit-succeed
          - p: "_{Reduce failure on saves vs disease and poison if another ablity would upgrade success}"
            icon: save-fail

  - at: '@saving-throws'
    add:
      - p:
        title: "_{Sewer Ratfolk}"
      - value-block: "+1"
        content: "_{and upgraded success on saves against diseases and poisons}"
