unit: heritage/ratfolk/remaster/desert
in: heritage/apg/ratfolk
group: "_{Player Core 2}"
name: "_{Desert Ratfolk}"
# enabled: false

inc:
  # set the heritage name
  - set: heritage
    value: "_{Desert Ratfolk}"

  # create the heritage text block
  - at: '@heritage'
    replace:
      - article:
        title: "_{Desert Ratfolk}"
        contents:
          # simple description
          - value-block: "_{30 ft}"
            width: "medium"
            content: "_{Speed when both hands are free}"          
          #  temperature adjustment
          - paste: temperature-tolerance
            params: 
              temp: "_{heat}"
          - p: "_{Can go 10 times as long as normal before you are affectwed by starvation or thirst.}"
          - p: "_{Treat environmental cold as one step more extreme.}"
