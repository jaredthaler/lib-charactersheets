unit: heritage/ratfolk/remaster/tunnel
in: heritage/apg/ratfolk
group: "_{Player Core 2}"
name: "_{Tunnel Ratfolk}"
# enabled: false

require:
  - unit: feat/quick-squeeze
  
inc:
  # set the heritage name
  - set: heritage
    value: "_{Tunnel Ratfolk}"

  # create the heritage text block
  - at: '@heritage'
    replace:
      - article:
        title: "_{Tunnel Ratfolk}"
        contents:
          # simple description
          - p: "_{Tight spaces that don't require you to Squeeze aren't difficult terrain for you.}"
          - paste: feat/quick-squeeze
