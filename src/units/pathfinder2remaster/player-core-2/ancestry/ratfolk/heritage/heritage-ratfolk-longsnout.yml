unit: heritage/ratfolk/remaster/longsnout
in: heritage/apg/ratfolk
group: "_{Player Core 2}"
name: "_{Longsnout Ratfolk}"
# enabled: false

inc:
  # set the heritage name
  - set: heritage
    value: "_{Longsnout Ratfolk}"
  - set: perception-darkvision
    value: true

  # create the heritage text block
  - at: '@heritage'
    replace:
      - article:
        title: "_{Longsnout Ratfolk}"
        contents:
          # simple description
          - p:
            title: "_{Scent}"
            content: "_{30ft}"
          - value-block: "+2"
            content: "_{Perception to Seek a creature within range of your scent}"
