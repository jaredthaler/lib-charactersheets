unit: heritage/lizardfolk/remaster/woodstalker
in: heritage/lost-omens/character-guide/lizardfolk
group: "_{Player Core 2}"
name: "_{Woodstalker Lizardfolk}"
# enabled: false

inc:
  # set the heritage name
  - set: heritage
    value: "_{Woodstalker Lizardfolk}"

  # create the heritage text block
  - at: '@heritage'
    replace:
      - article:
        title: "_{Woodstalker Lizardfolk}"
        contents:
          # simple description
          - p: "_{Can always Take Cover when in forest or jungle.}"
          - paste: feat/terrain-stalker
            params: 
              id: "feat/terrain-stalker-woodstalker"

  - at: '@feat/terrain-stalker-woodstalker:terrain'
    replace:
      - h6: "_{Underbrush}"
