unit: heritage/lizardfolk/remaster/frilled
in: heritage/lost-omens/character-guide/lizardfolk
group: "_{Player Core 2}"
name: "_{Frilled Lizardfolk}"
# enabled: false

inc:
  # set the heritage name
  - set: heritage
    value: "_{Frilled Lizardfolk}"

  # create the heritage text block
  - at: '@heritage'
    replace:
      - article:
        title: "_{Frilled Lizardfolk}"
        contents:
          # simple description
          - p: "_{Can flare frill to demoralize}"
          - flags:
              - "_{Visual}"
          - action: 2
            contents:
              - p:
                title: "_{Threatening Approach}"
                content: "_{Stride adjacent to foe and Demoralise. If you succeed they are frightened 2.}"

  - at: '@actions'
    add:
      - action: 2
        contents:
          - p:
            title: "_{Threatening Approach}"
            content: "_{Stride adjacent to foe and Demoralise. If you succeed they are frightened 2.}"
