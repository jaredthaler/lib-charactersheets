unit: heritage/lizardfolk/remaster/unseen
in: heritage/lost-omens/character-guide/lizardfolk
group: "_{Player Core 2}"
name: "_{Unseen Lizardfolk}"
# enabled: false

inc:
  # set the heritage name
  - set: heritage
    value: "_{Unseen Lizardfolk}"

  # create the heritage text block
  - at: '@heritage'
    replace:
      - article:
        title: "_{Unseen Lizardfolk}"
        contents:
          # simple description
          - p: "_{Make a small change to your skin color as 1 action, or a full change in an hour.}"
          - value-block: "_{+2}"
            content: "_{to Stealth when matching your surroundings.}"

  - at: '@actions'
    add:
      - action: 1
        contents:
          - article:
            title: "_{Chameleon}"
            content: "_{Make a minor change to your skin color skin. If in a terrain that matches your general colour, gain +2 to Stealth.}"
