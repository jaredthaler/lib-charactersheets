unit: ancestry/remaster/lizardfolk
in: ancestry
group: "_{Player Core 2}"
name: "_{Lizardfolk}"
# enabled: false

require:
  - unit: feat/breath-control

form:
  - select: heritage/apg/lizardfolk
    name: "_{Catfolk Heritage}"
    max: 1
  
inc:
  - set: ancestry
    value: "_{lizardfolk}"
  - set: hp-ancestry
    value: 8
# stat boosts
  - set: build-boost-STR-ancestry
    value: 1
  - set: build-boost-WIS-ancestry
    value: 1
  - set: build-boost-INT-ancestry
    value: -1
# set languages
  - set: languages
    value: "_{Common}, _{Iruxi}"

# write ancestry short descriptions
  - at: '@ancestry'
    replace:
      - article: ancestry
        title: "_{lizardfolk}"
        contents:
          - flags:
              - "_{lizardfolk}"
              - "_{Humanoid}"
          - field: ancestry-speed
            frame: right
            label: "_{Speed}"
            control: 25
            value: "_{25 ft}"
          - paste: natural-weapon
            params:
              name: "_{Claws}"
              damage: "_{1d4}"
              type: "_{Slashing}"
            contents:
              - flags:
                  - "_{Brawling}"
                  - "_{Agile}"
                  - "_{Finesse}"
                  - "_{Unarmed}"
          - hr:
            light: true
          - paste: feat/breath-control

  # add a natural weapon
  - at: '@actions'
    add:
      - action: 1
        contents:
          - article:
            title: "_{Claws attack}"
            contents:
              - paste: natural-weapon-action
                params:
                  id: ancestry/lizardfolk/claws-attack
                  name: "_{Claws}"
                  damage: "_{1d4}"
                  type: "_{S}"
              - flags:
                  - "_{Agile}"
                  - "_{Brawling}"
                  - "_{Finesse}"
                  - "_{Unarmed}"


            
