unit: ancestry/remaster/kobold
in: ancestry
group: "_{Player Core 2}"
name: "_{Kobold}"
# enabled: false

form:
  - select: heritage/apg/kobold
    name: "_{Kobold Heritage}"
    max: 1

inc:
  - set: ancestry
    value: "_{Kobold}"
  - set: hp-ancestry
    value: 6
# set darkvision / low vision light
  - set: perception-darkvision
    value: true
# stat boosts
  - set: build-boost-DEX-ancestry
    value: 1
  - set: build-boost-CHA-ancestry
    value: 1
  - set: build-boost-CON-ancestry
    value: -1
# set languages
  - set: languages
    value: "_{Common}, _{Sakvroth}"

# write ancestry short descriptions
  - at: '@ancestry'
    replace:
      - article: ancestry
        title: "_{Kobold}"
        contents:
          - flags:
              - "_{Kobold}"
              - "_{Humanoid}"
          - field: ancestry-speed
            frame: right
            label: "_{Speed}"
            control: value
            value: "_{25 ft}"
          # copy in the low light / dark vision description
          - paste: darkvision
