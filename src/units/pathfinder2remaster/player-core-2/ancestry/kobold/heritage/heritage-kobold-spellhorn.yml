unit: heritage/kobold/remaster/spellhorn
in: heritage/apg/kobold
group: "_{Player Core 2}"
name: "_{Spellhorn Kobold}"
# enabled: false

inc:
  # set the heritage name
  - set: heritage
    value: "_{Spellhorn Kobold}"

  # create the heritage text block
  - at: '@heritage'
    replace:
      - article:
        title: "_{Spellhorn Kobold}"
        contents:
          # simple description
          - field: apg/kobold/spellscale/cantrip
            label: "_{Cantrip}"
            width: stretch
          - calc:
            output:
              field: "arcane-spell-attack"
              legend: "_{Arcane Spell Attack}"
              width: large
              border: full
              eq: "%{CHA}+%{arcane-proficiency-bonus}"
            inputs:
              - field:
                label: "_{CHA}"
                ref: CHA
                underlay: "_{CHA}"
              - span: "+"
              - field: "arcane-proficiency"
                label: "_{Proficiency}"
                control: proficiency
