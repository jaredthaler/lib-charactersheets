unit: heritage/kobold/remaster/strongjaw
in: heritage/apg/kobold
group: "_{Player Core 2}"
name: "_{Strongjaw Kobold}"
# enabled: false

inc:
  # set the heritage name
  - set: heritage
    value: "_{Strongjaw Kobold}"

  # create the heritage text block
  - at: '@heritage'
    replace:
      - article:
        title: "_{Strongjaw Kobold}"
        contents:
          # simple description
          # add a weapon
          - paste: natural-weapon
            params:
              name: "_{Jaws}"
              damage: "_{1d6}"
              type: "_{Piercing}"
          - flags:
              - "_{Brawling}"
              - "_{Finesse}"
              - "_{Unarmed}"

  # add a natural weapon
  - at: '@actions'
    add:
      - action: 1
        contents:
          - article:
            title: "_{Jaws attack}"
            contents:
              - paste: natural-weapon-action
                params:
                  id: kobold/strongjaw/jaws-action
                  name: "_{Jaws}"
                  damage: "_{1d6}"
                  type: "_{P}"
              - flags:
                  - "_{Brawling}"
                  - "_{Finesse}"
                  - "_{Unarmed}"

