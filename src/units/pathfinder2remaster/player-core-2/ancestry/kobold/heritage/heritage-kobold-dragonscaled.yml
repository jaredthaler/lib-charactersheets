unit: heritage/kobold/remaster/dragonscaled
in: heritage/apg/kobold
group: "_{Player Core}"
name: "_{Dragonscaled Kobold}"
# enabled: false

inc:
  # set the heritage name
  - set: heritage
    value: "_{Dragonscaled Kobold}"

  - set: hp-ancestry
    value: 10
    priority: high


  # create the heritage text block
  - at: '@heritage'
    replace:
      - article:
        title: "_{Dragonscaled Kobold}"
        contents:
          # simple description
          - value-block: "10 _{hp}"
            width: "medium"
            content: "_{from ancestry.}"
          - value-block: "_{+1}"
            content: "_{to save vs. dragon breath, sleep, and paralysis.}"

  # add a heritage savign throw reaction with a numeric bonus
  - at: '@saving-throws'
    add:
      - value-block: "_{+1}"
        content: "_{to save vs. dragon breath, sleep, and paralysis.}"

