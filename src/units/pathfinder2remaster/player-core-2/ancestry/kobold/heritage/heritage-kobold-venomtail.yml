unit: heritage/kobold/remaster/venomtail
in: heritage/apg/kobold
group: "_{Player Core 2}"
name: "_{Venomtail Kobold}"
# enabled: false

inc:
  # set the heritage name
  - set: heritage
    value: "_{Venomtail Kobold}"

  # create the heritage text block
  - at: '@heritage'
    replace:
      - article:
        title: "_{Venomtail Kobold}"
        contents:
          # simple description
          - action:
            contents:
              - p:
                title: "_{Tail Toxin}"
                content: "_{Once a day, apply venom to a weapon. If its next attack hits, deal persistent poison equal to your level.}"

  - at: '@actions'
    add:
      - action:
        contents:
          - p:
            title: "_{Tail Toxin}"
            content: "_{Once a day, apply venom to a weapon. If its next attack hits, deal persistent poison equal to your level.}"
