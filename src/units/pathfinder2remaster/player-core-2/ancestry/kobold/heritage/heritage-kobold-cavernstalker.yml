unit: heritage/kobold/remaster/cavernstalker
in: heritage/apg/kobold
group: "_{Player Core}"
name: "_{Cavernstalker Kobold}"
# enabled: false

inc:
  # set the heritage name
  - set: heritage
    value: "_{Cavernstalker Kobold}"

  # create the heritage text block
  - at: '@heritage'
    replace:
      - article:
        title: "_{Cavernstalker Kobold}"
        contents:
          # simple description
          - list:
            hr: true
            light: true
            contents:
              - g: 
                contents:
                  - p: "_{Climb rock walls at half your speed on successful Athletics, or full speed on a critical success.}"
                  - p: "_{Upgraded success on Acrobatics checks to Squeeze.}"
                    icon: save-crit-succeed
              - selectable: "##:quick-climber"
                contents:
                  - h6: "_{Quick Climber}"
                  - p: "_{Climb at full speed on a success.}"
