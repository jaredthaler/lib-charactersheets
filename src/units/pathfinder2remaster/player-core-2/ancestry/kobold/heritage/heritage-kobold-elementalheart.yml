unit: heritage/kobold/remaster/elementalheart
in: heritage/apg/kobold
group: "_{Player Core}"
name: "_{Elementalheart Kobold}"
# enabled: false

inc:
  # set the heritage name
  - set: heritage
    value: "_{Elementalheart Kobold}"

  # create the heritage text block
  - at: '@heritage'
    replace:
      - article:
        title: "_{Elementalheart Kobold}"
        contents:
          # simple description
          - field: kobold/elementalheart/resistance-type
            label: "_{Energy type}"
            width: stretch
          - paste: leveled-damage-resist
            params:
              id: kobold/elementalheart/energy-resistance
              type: ""

  # add a damage resist
  - at: '@health'
    add:
      - row:
        contents:
        - field: kobold/elementalheart/resistance-type-health
          label: "_{Energy type}"
          width: stretch
        - paste: leveled-damage-resist-health
          params:
            id: kobold/elementalheart/energy-resistance-health
            type: ""


