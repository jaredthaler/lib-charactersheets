unit: heritage/kobold/remaster/elementalheart
in: heritage/apg/kobold
group: "_{Player Core}"
name: "_{Elementalheart Kobold}"
# enabled: false

inc:
  # set the heritage name
  - set: heritage
    value: "_{Elementalheart Kobold}"

  # create the heritage text block
  - at: '@heritage'
    replace:
      - article:
        title: "_{Elementalheart Kobold}"
        contents:
          # simple description
          - field: apg/kobold/dragonscaled/resistance-type
            label: "_{Energy type}"
            width: stretch
          - paste: leveled-damage-resist
            params:
              id: kobobl/elementalheart/energy-resistance

  # add a damage resist
  - field: apg/kobold/dragonscaled/resistance-type
    label: "_{Energy type}"
    width: stretch
  - at: '@health'
    add:
      - paste: leveled-damage-resist-health
        params:
          id: <unique id>


