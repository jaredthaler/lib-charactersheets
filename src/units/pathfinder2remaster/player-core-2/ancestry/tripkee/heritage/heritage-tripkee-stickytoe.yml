unit: heritage/tripkee/remaster/stickytoe
in: heritage/lost-omens/mwangi-expanse/grippli
group: "_{Player Core 2}"
name: "_{Stickytoe Tripkee}"
# enabled: false

inc:
  # set the heritage name
  - set: heritage
    value: "_{Stickytoe Tripkee}"

  # create the heritage text block
  - at: '@heritage'
    replace:
      - article:
        title: "_{Stickytoe Tripkee}"
        contents:
          # simple description
          - value-block: "_{+2}"
            content: "_{Fortitude and Reflex DC vs Disarm, Shove, Reposition, or Trip}"
          - p: "_{Upgraded success on Athletics to climb vines and foliage.}"
            icon: save-crit-succeed

  # add a heritage savign throw numeric bonus
  - at: '@saving-throws'
    add:
      - p:
        title: "_{Stickytoe Tripkee}"
      - value-block: "_{+2}"
        content: "_{Fortitude and Reflex DC vs Disarm, Shove, Reposition, or Trip}"
