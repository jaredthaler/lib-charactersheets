unit: heritage/tripkee/remaster/poisonhide
in: heritage/lost-omens/mwangi-expanse/grippli
group: "_{Player Core 2}"
name: "_{Poisonhide Tripkee}"
# enabled: false

inc:
  # set the heritage name
  - set: heritage
    value: "_{Poisonhide Tripkee}"

  # create the heritage text block
  - at: '@heritage'
    replace:
      - article:
        title: "_{Poisonhide Tripkee}"
        contents:
          # simple description
          - action: reaction
            contents:
              - p:
                title: "_{Toxic Skin}"
                content: "_{Once an hour when touched, exide a toxin}"
              - calc:
                output:
                  field: "##:damage"
                  legend: "_{Poison Damage}"
                  suffix: "_{d4}"
                  width: large
                  eq: "ceil(%{level}/2)"
                inputs:
                  - ruby-round-up:
                    contents:
                      - field:
                        ref: level
                        label: "_{Level}"
                      - span: "&divide; 2"
              - flags:
                - "_{Poison}"
