unit: heritage/tripkee/remaster/snaptongue
in: heritage/lost-omens/mwangi-expanse/grippli
group: "_{Player Core 2}"
name: "_{Snaptongue Tripkee}"
# enabled: false

inc:
  # set the heritage name
  - set: heritage
    value: "_{Snaptongue Tripkee}"
  - set: hp-ancestry
    value: 8
    priority: high


  # create the heritage text block
  - at: '@heritage'
    replace:
      - article:
        title: "_{Snaptongue Tripkee}"
        contents:
          # simple description
          - value-block: "+1"
            content: "_{Saves vs diseases and poisons}"

  # add a heritage savign throw numeric bonus
  - at: '@saving-throws'
    add:
      - p:
        title: "_{Thickskin Tripkee}"
      - value-block: "_{+1}"
        content: "_{Saves vs diseases and poisons}"
