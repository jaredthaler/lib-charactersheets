unit: remaster/alchemist/research-field/bomber
in: remaster/alchemist/research-field
group: "_{Player Core 2}"
name: "_{Bomber}"

inc:
  - set: alchemist-research-field
    value: "_{Bomber}"

  - at: '@alchemist/research-field'
    replace:
      - g:
        contents:
          - h4: "_{Bomber}"
          - hr:
            swash: true

          - layout: 2e
            contents:
              - g:
                contents:
                  - h5: "_{Field Benefit}"
                  - p: "_{You can choose to deal splash damage to only your primary target instead of the usual splash area.}"

              - g:
                contents:
                  - h5: "_{Field Vials}"
                  - g:
                    contents:
                      - p: "_{Versatile vials can deal dold, electricity or fire damage.}"

      - level: 5
        contents:
          - layout: 2e
            contents:
              - g:
                contents:
                  - h5: "_{Field Discovery}"
                  - p: "_{When you throw an alchemical bomb with the splash trait, deal more damage.}"

              - g:
                contents:
                  - calc:
                    output:
                      field: "##:splash-damage"
                      width: large
                      legend: "_{Splash Damage}"
                      border: full
                      eq: "%{INT}"
                    inputs:
                      - ruby: "_{Min 1}"
                        contents:
                          - field:
                            ref: INT
                            label: "_{INT}"

      - level: 11
        contents:
          - h5: "_{Advanced Vials}"
          - p: "_{Versatile vials can be adamantine, cold iron, dawnsilver, or any material you're wearing or wielding.}"

      - level: 13
        contents:
          - h5: "_{Greater Field Discovery}"
          - p: "_{Increase splash area to 10ft (or 15ft if you have Expanded Splash).}"
          
  - at: '@alchemist/research-field/formulas'
    replace:
      - table: "##:formulas"
        field_frame: none
        width: stretch
        merge-bottom: true
        columns:
          - label: "_{Bomb}"
            align: left
          - "_{Level}"
          - "_{Type}"
          - "_{Attack}"
          - "_{Damage}"
          - "_{Persistent}"
          - "_{Splash}"
        rows:
          - n: 1
          - n: 2
        template:
          - field: alchemist-bomb-#{i}
            width: stretch
            label: "&nbsp;"
            underlay: "#{n}"
          - field: alchemist-bomb-#{i}-level
            width: small
          - field: alchemist-bomb-#{i}-type
            width: huge
            
          - field: alchemist-bomb-#{i}-attack-bonus
            prefix: "+"
            border: full
            
          - field: alchemist-bomb-#{i}-damage
            width: huge
            icon: damage
            control: compound
            parts:
              - subid: ndice
                width: tiny
                align: right
              - label: "_{d}"
              - subid: die
                width: tiny
                align: left

          - field: alchemist-bomb-#{i}-persistent-damage
          - field: alchemist-bomb-#{i}-splash
            control: compound
            width: large
            parts:
              - field: alchemist-bomb-#{i}-splash
                control: checkbox
              - field: alchemist-bomb-#{i}-splash-dmg
                width: large

  - at: '@formula-book/left'
    replace:
      - list:
        zebra: true
        hr: true
        flex: true
        contents:
          - repeat: 5
            index: j
            contents:
              - article: formula-book-bomb-#{j}
                show-level: true
                header:
                  - row:
                    contents:
                      - field: 'formula-book-bomb-#{j}'
                        width: stretch
                        align: left
                        legend: "_{Bomb}"
                      - field: 'formula-book-bomb-#{j}-level'
                        label: "_{Level}"
                  
                contents:
                  - field: 'formula-book-bomb-#{j}-details'
                    width: stretch
                    align: left
                    frame: none
                    repeat: 2
                    reduce: 1
                  - row:
                    contents:
                      - field: formula-book-bomb-#{j}-type
                        width: stretch
                        label: "_{Type}"
                        
                      - field: formula-book-bomb-#{j}-attack-bonus
                        prefix: "+"
                        border: full
                        label: "_{Attack}"
                        
                  - row:
                    contents:
                      -
                      - field: formula-book-bomb-#{j}-damage
                        width: huge
                        icon: damage
                        control: compound
                        label: "_{Damage}"
                        parts:
                          - subid: ndice
                            width: tiny
                            align: right
                          - label: "_{d}"
                          - subid: die
                            width: tiny
                            align: left
                      - field: formula-book-bomb-#{j}-persistent-damage
                        label: "_{Persistent}"
                      - field: formula-book-bomb-#{j}-splash
                        label: "_{Splash}"
                        control: compound
                        width: large
                        parts:
                          - field: formula-book-bomb-#{j}-splash
                            control: checkbox
                          - field: formula-book-bomb-#{j}-splash-dmg
                            width: large
                  - row:
                    contents:
                      - field: 'formula-book-bomb-#{j}-final'
                        width: stretch
                      - field: 'formula-book-bomb-#{j}-ref'
                        icon: book
                        label: "_{Source}"
                        align: left
                        width: huge
                        control: compound
                        parts:
                          - width: large
                          - span: 'p'
                          - width: large
                            align: left
